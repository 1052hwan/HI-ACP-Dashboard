<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자동유량측정시설 원시자료 취득현황</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.8);
            --sticky-bg: #1e293b;
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --accent-tertiary: #fbbf24;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            padding: 1rem;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            line-height: 1.2;
        }

        @media (min-width: 768px) {
            h1 {
                flex-direction: row;
                justify-content: center;
                gap: 0.8rem;
                font-size: 2.2rem;
            }
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.4rem; }
        }

        .controls {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1rem;
            gap: 0.5rem;
        }

        select,
        button {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 0.9rem;
        }

        /* [핵심] 고정 헤더 및 컬럼 레이블 스타일 */
        .table-container {
            background: var(--glass-bg);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            overflow: auto;
            max-height: calc(100vh - 180px);
            /* 세로 스크롤 활성화 */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 1600px;
        }

        /* 상단 헤더 고정 */
        th {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--sticky-bg);
            padding: 1rem;
            color: var(--accent-primary);
            font-weight: 600;
            border-bottom: 2px solid var(--glass-border);
        }

        /* 좌측 1개 컬럼 고정 (관측소 정보, 유속계, 구분) */
        .sticky-col-1 {
            position: sticky;
            left: 0;
            z-index: 50;
            background: var(--sticky-bg) !important;
            width: 220px;
        }


        /* 헤더 교차 지점(좌측 상단) 우선순위 */
        th.sticky-col-1,
        th.sticky-col-2,
        th.sticky-col-3 {
            z-index: 150;
        }

        td {
            padding: 0.8rem;
            border-bottom: 1px solid var(--glass-border);
            text-align: center;
            font-size: 0.9rem;
        }

        .st-name {
            font-weight: 600;
            color: #fff;
            display: block;
        }

        .st-code {
            color: var(--text-dim);
            font-size: 0.75rem;
            font-family: 'Inter', monospace;
        }

        .type-badge {
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .type-advm {
            background: rgba(56, 189, 248, 0.2);
            color: var(--accent-primary);
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        .type-ewsv {
            background: rgba(251, 191, 36, 0.2);
            color: var(--accent-tertiary);
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .cat-item {
            height: 1.4rem;
            font-weight: 600;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .val-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .v-item {
            height: 1.4rem;
            font-family: 'Inter', monospace;
            font-weight: 600;
        }

        .v-file {
            color: #fff;
        }

        .v-wl {
            color: var(--accent-primary);
        }

        .v-vel {
            color: var(--accent-secondary);
        }

        .loading {
            padding: 5rem;
            text-align: center;
            color: var(--text-dim);
        }
    </style>
</head>

<body>
    <header>
        <h1>
            <span>자동유량측정시설</span>
            <span>원시자료 취득현황</span>
        </h1>
    </header>

    <div class="controls">
        <select id="year-select" onchange="fetchData()">
            <option value="2026">2026년</option>
            <option value="2025">2025년</option>
        </select>
        <button onclick="init()">새로고침</button>
    </div>

    <div class="table-container" id="main-content">
        <div class="loading">데이터를 불러오는 중...</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xazawfworzofqgpgzagz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_WJHCdWLzQyoucZL1oelBag_FSYgdJcS';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let siteNames = {};

        async function fetchSiteNames() {
            try {
                const response = await fetch('sitename.txt');
                const text = await response.text();
                text.split('\n').forEach(line => {
                    const parts = line.split(',');
                    if (parts.length >= 2) siteNames[parts[0].trim()] = parts[1].trim();
                });
            } catch (e) { console.error("명칭 로드 실패", e); }
        }

        async function init() {
            await fetchSiteNames();
            fetchData();
        }

        async function fetchData() {
            const year = document.getElementById('year-select').value;
            const content = document.getElementById('main-content');
            content.innerHTML = '<div class="loading">데이터 로딩 중...</div>';

            try {
                const { data: logs, error } = await supabaseClient
                    .from('collection_logs')
                    .select('*')
                    .like('target_month', `${year}%`)
                    .order('station_code', { ascending: true });

                if (error) throw error;

                const matrix = {};
                logs.forEach(log => {
                    const st = log.station_code;
                    const type = (log.file_type === 'ADV') ? 'ADVM' : 'EWSV';
                    const key = st + "_" + type;
                    const mIdx = parseInt(log.target_month.substring(4)) - 1;

                    if (!matrix[key]) {
                        matrix[key] = { st: st, type: type, ann: { f: 0, w: 0, v: 0 }, mon: Array(12).fill(null).map(() => ({ f: 0, w: 0, v: 0, c: 0 })) };
                    }
                    const target = matrix[key].mon[mIdx];
                    target.f += log.total_files; target.w += log.valid_wl_count; target.v += log.valid_vel_count; target.c++;
                    matrix[key].ann.f += log.total_files; matrix[key].ann.w += log.valid_wl_count; matrix[key].ann.v += log.valid_vel_count;
                });

                let html = `<table><thead><tr>
                    <th class="sticky-col-1">관측소 정보</th>
                    <th class="sticky-col-2">유속계</th>
                    <th class="sticky-col-3">구분</th>
                    <th style="width:120px">연간 누적</th>
                    ${Array.from({ length: 12 }, (_, i) => `<th style="width:100px">${i + 1}월</th>`).join('')}
                </tr></thead><tbody>`;

                // [규칙 1] 관측소 코드 순 -> 유속계 타입 순 정렬
                const sortedKeys = Object.keys(matrix).sort((a, b) => {
                    const codeA = matrix[a].st;
                    const codeB = matrix[b].st;
                    if (codeA !== codeB) return codeA.localeCompare(codeB);
                    return matrix[a].type.localeCompare(matrix[b].type);
                });

                for (const key of sortedKeys) {
                    const e = matrix[key];
                    const typeClass = e.type === 'ADVM' ? 'type-advm' : 'type-ewsv';

                    html += `<tr>
                        <td class="sticky-col-1">
                            <span class="st-name">${siteNames[e.st] || '미등록 관측소'}</span>
                            <span class="st-code">${e.st}</span>
                        </td>
                        <td class="sticky-col-2"><span class="type-badge ${typeClass}">${e.type}</span></td>
                        <td class="sticky-col-3">
                            <div class="cat-item">파일수</div>
                            <div class="cat-item">수위</div>
                            <div class="cat-item">유속</div>
                        </td>
                        <td>
                            <div class="val-group">
                                <span class="v-item v-file">${e.ann.f.toLocaleString()}</span>
                                <span class="v-item v-wl">${e.ann.w.toLocaleString()}</span>
                                <span class="v-item v-vel">${e.ann.v.toLocaleString()}</span>
                            </div>
                        </td>`;

                    e.mon.forEach(m => {
                        html += `<td>${m.c > 0 ? `
                            <div class="val-group">
                                <span class="v-item v-file">${m.f.toLocaleString()}</span>
                                <span class="v-item v-wl">${m.w.toLocaleString()}</span>
                                <span class="v-item v-vel">${m.v.toLocaleString()}</span>
                            </div>` : '<span style="color:rgba(255,255,255,0.1)">-</span>'}</td>`;
                    });
                    html += `</tr>`;
                }
                content.innerHTML = html + `</tbody></table>`;
            } catch (e) {
                content.innerHTML = `<div class="loading">에러: ${e.message}</div>`;
            }
        }
        init();
    </script>
</body>

</html>
